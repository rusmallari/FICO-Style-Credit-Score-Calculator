<script>
let accountId = 0;
const accounts = {};

const accountConfig = {
  'credit-card':   { label: 'Credit Card',   hasCredit: true },
  'car-loan':      { label: 'Car Loan',      hasCredit: false },
  'student-loan':  { label: 'Student Loan',  hasCredit: false },
  'mortgage':      { label: 'Mortgage',      hasCredit: false },
  'personal-loan': { label: 'Personal Loan', hasCredit: false },
};

// -----------------------------
// ACCOUNT HANDLING
// -----------------------------
function addAccount(type) {
  const id = ++accountId;
  const cfg = accountConfig[type];

  const container = type === 'credit-card'
    ? document.getElementById('cc-cards')
    : document.getElementById('loan-cards');

  const card = document.createElement('div');
  card.className = 'account-card';
  card.id = 'account-' + id;

  const creditFields = cfg.hasCredit
    ? `
      <div class="field">
        <label>Credit limit ($)</label>
        <input type="number" data-key="limit" placeholder="e.g. 5000" min="0" />
      </div>
      <div class="field">
        <label>Current balance ($)</label>
        <input type="number" data-key="balance" placeholder="e.g. 800" min="0" />
      </div>
    `
    : '';

  card.innerHTML = `
    <div class="account-card-header">
      <div class="account-card-title">${cfg.label}</div>
      <button class="remove-btn" onclick="removeAccount(${id})">&times;</button>
    </div>

    <div class="form-grid">
      <div class="field">
        <label>On-time payments</label>
        <input type="number" data-key="ontime" placeholder="e.g. 12" min="0" />
      </div>

      <div class="field">
        <label>Total payments scheduled</label>
        <input type="number" data-key="total" placeholder="e.g. 12" min="0" />
      </div>

      ${creditFields}
    </div>
  `;

  container.appendChild(card);
  accounts[id] = { type, element: card };
}

function removeAccount(id) {
  if (accounts[id]) {
    accounts[id].element.remove();
    delete accounts[id];
  }
}

function getVal(card, key) {
  const el = card.querySelector(`[data-key="${key}"]`);
  return el ? parseFloat(el.value) : NaN;
}

// -----------------------------
// UTILIZATION CURVE (GOOD)
// -----------------------------
function utilScore(pct) {
  if (pct <= 9)  return 100;
  if (pct <= 19) return 100 - (pct - 9) * 1.0;
  if (pct <= 29) return 90  - (pct - 19) * 1.2;
  if (pct <= 49) return 78  - (pct - 29) * 1.2;
  if (pct <= 74) return 54  - (pct - 49) * 1.0;
  return Math.max(29 - (pct - 74) * 0.6, 0);
}

// -----------------------------
// MAIN CALCULATION
// -----------------------------
function calculate() {
  const err = document.getElementById('err');
  err.classList.remove('show');

  const history = parseFloat(document.getElementById('history').value);
  const inquiries = parseFloat(document.getElementById('inquiries').value);
  const lateRecency = document.getElementById('late-recency').value;
  const derogatory = document.getElementById('derogatory').value;

  if (isNaN(history) || isNaN(inquiries)) {
    showError('Please fill in credit history length and inquiries.');
    return;
  }

  const ids = Object.keys(accounts);
  if (ids.length === 0) {
    showError('Please add at least one account.');
    return;
  }

  let totalOntime = 0, totalSched = 0;
  let totalLimit = 0, totalBalance = 0;
  let hasRevolving = false, hasInstallment = false;

  for (let id of ids) {
    const acc = accounts[id];
    const cfg = accountConfig[acc.type];
    const el = acc.element;

    const ontime = getVal(el, 'ontime');
    const total = getVal(el, 'total');

    if (isNaN(ontime) || isNaN(total)) {
      showError(`Fill all fields for ${cfg.label}`);
      return;
    }

    if (ontime > total) {
      showError(`On-time cannot exceed total for ${cfg.label}`);
      return;
    }

    totalOntime += ontime;
    totalSched += total;

    if (cfg.hasCredit) {
      hasRevolving = true;

      const limit = getVal(el, 'limit');
      const balance = getVal(el, 'balance');

      totalLimit += limit;
      totalBalance += balance;
    } else {
      hasInstallment = true;
    }
  }

  if (totalSched === 0) {
    showError('Invalid payment data');
    return;
  }

  // -----------------------------
  // PAYMENT HISTORY (35%)
  // -----------------------------
  let payScore = (totalOntime / totalSched) * 100;

  const lateMap = { never: 1.0, old: 0.93, mid: 0.80, recent: 0.62 };
  payScore *= lateMap[lateRecency];

  const derogMap = { none: 0, collection: 18, bankruptcy: 35 };
  payScore = Math.max(payScore - derogMap[derogatory], 0);

  // -----------------------------
  // UTILIZATION (30%)
  // -----------------------------
  let utilScoreVal = 100;
  if (hasRevolving && totalLimit > 0) {
    utilScoreVal = utilScore((totalBalance / totalLimit) * 100);
  }

  // -----------------------------
  // FIXED CREDIT AGE (IMPORTANT FIX)
  // -----------------------------
  let lenScore = 100 * (Math.log(history + 1) / Math.log(12));
  lenScore = Math.min(lenScore, 100);

  // -----------------------------
  // CREDIT MIX (10%)
  // -----------------------------
  let mixScore = (hasRevolving && hasInstallment) ? 100 :
                 hasRevolving ? 65 : 50;

  // -----------------------------
  // NEW CREDIT (10%)
  // -----------------------------
  let inqScore = Math.max(100 - inquiries * 12, 0);

  // -----------------------------
  // COMPOSITE SCORE
  // -----------------------------
  const raw =
    payScore * 0.35 +
    utilScoreVal * 0.30 +
    lenScore * 0.15 +
    mixScore * 0.10 +
    inqScore * 0.10;

  // FIXED SCALING (CRITICAL FIX)
  let score = 300 + raw * 5.5;
  score = Math.round(Math.max(300, Math.min(850, score)));

  // -----------------------------
  // DEROGATORY CAPS
  // -----------------------------
  if (derogatory === 'bankruptcy') score = Math.min(score, 650);
  if (derogatory === 'collection') score = Math.min(score, 720);

  // -----------------------------
  // UI OUTPUT
  // -----------------------------
  let rating, color, tip;

  if (score >= 750) {
    rating = "Excellent"; color = "#1d9e75";
    tip = "Keep it up. Maintain low utilization and perfect payments.";
  } else if (score >= 700) {
    rating = "Good"; color = "#63b83e";
    tip = "Almost there — reduce utilization below 10% for best gains.";
  } else if (score >= 650) {
    rating = "Fair"; color = "#ef9f27";
    tip = "Focus on paying down balances and avoiding missed payments.";
  } else {
    rating = "Poor"; color = "#e24b4a";
    tip = "Prioritize on-time payments above everything else.";
  }

  document.getElementById('score-num').textContent = score;
  document.getElementById('score-num').style.color = color;

  document.getElementById('score-rating').textContent = rating;
  document.getElementById('score-rating').style.background = color + "22";
  document.getElementById('score-rating').style.color = color;

  document.getElementById('meter').style.width =
    ((score - 300) / 550 * 100) + "%";
  document.getElementById('meter').style.background = color;

  document.getElementById('b1').style.width = payScore + "%";
  document.getElementById('b2').style.width = utilScoreVal + "%";
  document.getElementById('b3').style.width = lenScore + "%";
  document.getElementById('b4').style.width = mixScore + "%";
  document.getElementById('b5').style.width = inqScore + "%";

  document.getElementById('v1').textContent = Math.round(payScore) + "%";
  document.getElementById('v2').textContent = Math.round(utilScoreVal) + "%";
  document.getElementById('v3').textContent = Math.round(lenScore) + "%";
  document.getElementById('v4').textContent = Math.round(mixScore) + "%";
  document.getElementById('v5').textContent = Math.round(inqScore) + "%";

  document.getElementById('tip').innerHTML = `<strong>${rating}</strong> ${tip}`;

  document.getElementById('result').classList.add('visible');
}

// -----------------------------
function showError(msg) {
  const err = document.getElementById('err');
  err.textContent = msg;
  err.classList.add('show');
}

// FAQ
function toggleFaq(btn) {
  const item = btn.closest('.faq-item');
  const open = item.classList.contains('open');

  document.querySelectorAll('.faq-item').forEach(el => el.classList.remove('open'));

  if (!open) item.classList.add('open');
}

// default card
addAccount('credit-card');
</script>
